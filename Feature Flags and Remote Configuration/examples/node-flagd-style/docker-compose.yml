services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  management-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: management-api
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./flags:/app/flags:ro

  demo-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: demo-app
    ports:
      - "3000:3000"
    environment:
      - FLAG_API_URL=http://management-api:3001
      - PORT=3000
    depends_on:
      - management-api
