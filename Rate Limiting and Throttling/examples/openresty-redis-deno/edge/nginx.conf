worker_processes  1;
events { worker_connections  1024; }

http {
  # OpenResty Lua libs path
  lua_package_path "/usr/local/openresty/lualib/?.lua;/etc/nginx/lua/?.lua;;";

  # DNS resolver for Docker
  resolver 127.0.0.11 ipv6=off;

  # Upstream backend (Deno)
  upstream backend {
    server service:9400;
    keepalive 16;
  }

  # Shared dict for local token bucket (per IP)
  lua_shared_dict ip_limit_store 10m;

  # --- Policy knobs (demo defaults) ---
  # Per-IP token bucket:
  #   rate = tokens per second; burst = max tokens
  # (Equivalent to allowing short bursts while enforcing sustained rate)
  lua_code_cache on;

  server {
    listen 9300;

    location = /health {
      return 200 "ok\n";
    }

    location /api/ {
      # Enforce auth (API key required)
      access_by_lua_file /etc/nginx/lua/access.lua;

      proxy_set_header X-Request-Id $request_id;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_pass http://backend;
    }
  }
}
