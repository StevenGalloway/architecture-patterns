apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: canary-mesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: mesh-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9800
          env:
            - name: PORT
              value: "9800"
            - name: BACKEND_URL
              value: "http://backend.canary-mesh.svc.cluster.local:8080"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9800
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: canary-mesh
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 9800
